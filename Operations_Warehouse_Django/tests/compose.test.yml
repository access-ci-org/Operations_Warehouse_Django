version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: warehouse2
      POSTGRES_USER: info_django
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"

  test:
    build:
      context: .
      dockerfile: ./Dockerfile.test
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://info_django:test_pass@db:5432/warehouse2
      DJANGO_SETTINGS_MODULE: Operations_Warehouse_Django.settings
    volumes:
      - ..:/app
